name: Content QA

on:
  push:
    branches: [main]
    paths:
      - 'src/data/**.json'
      - 'scripts/qa-structural-all-files.py'
      - '.github/workflows/content-qa.yml'
  pull_request:
    paths:
      - 'src/data/**.json'
      - 'scripts/qa-structural-all-files.py'
      - '.github/workflows/content-qa.yml'
  workflow_dispatch:

jobs:
  structural-qa:
    name: Structural QA on quiz data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run structural QA
        run: python3 scripts/qa-structural-all-files.py

      - name: QA summary
        if: always()
        run: |
          echo "Structural QA enforces CRITICAL rules on every commit to main and every PR touching src/data/*.json."
          echo "CRITICAL categories (build fails):"
          echo "  - placeholder text in question or option body"
          echo "  - wrong option count (must be exactly 4)"
          echo "  - answer not a single letter A|B|C|D"
          echo "  - answer letter points past end of options"
          echo "  - missing fields / empty question text"
          echo "WARN categories (tracked, non-fatal): duplicate questions, duplicate options, wrong week question count."
          echo "See PARKING_LOT.md → 'Phase D — Exhaustive Factual Audit' for the WARN backlog plan."
